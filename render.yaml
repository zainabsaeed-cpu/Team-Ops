services:
  - type: web
    name: teamops-backend
    env: node
    plan: free
    buildCommand: cd teamops-backend && npm install
    startCommand: cd teamops-backend && npm start
    autoDeploy: true
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EMAIL_FROM
        value: noreply@teamops.dev
